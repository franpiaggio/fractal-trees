name: Deploy all versions to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - '01-ez-tree-baseline/**'
      - '02-fps-infinite-forest/**'
      - '03-fps-experiment/**'
      - '04-post-processing/**'
      - '05-graphics-tiers/**'
      - '06-godrays/**'
      - '15-ps1/**'
      - 'pages/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build each version into its own subdirectory of the deploy artifact.
      # Each version's vite config has `base: /fractal-trees/<n>/` so asset URLs
      # resolve correctly under the Pages subpath.
      - name: Build 01
        working-directory: 01-ez-tree-baseline
        run: |
          npm ci
          npm run build

      - name: Build 02
        working-directory: 02-fps-infinite-forest
        run: |
          npm ci
          npm run build

      - name: Build 03
        working-directory: 03-fps-experiment
        run: |
          npm ci
          npm run build

      - name: Build 04
        working-directory: 04-post-processing
        run: |
          npm ci
          npm run build

      - name: Build 05
        working-directory: 05-graphics-tiers
        run: |
          npm ci
          npm run build

      - name: Build 06
        working-directory: 06-godrays
        run: |
          npm ci
          npm run build

      - name: Build 15
        working-directory: 15-ps1
        run: |
          npm ci
          npm run build

      # Combine all builds + landing page into one deploy artifact.
      - name: Assemble deploy directory
        run: |
          mkdir -p _site
          cp pages/index.html _site/index.html
          cp -r 01-ez-tree-baseline/dist    _site/01
          cp -r 02-fps-infinite-forest/dist _site/02
          cp -r 03-fps-experiment/dist      _site/03
          cp -r 04-post-processing/dist     _site/04
          cp -r 05-graphics-tiers/dist      _site/05
          cp -r 06-godrays/dist             _site/06
          cp -r 15-ps1/dist                 _site/15
          ls -la _site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
