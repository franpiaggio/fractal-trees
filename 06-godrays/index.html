<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>06 · Godrays</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0d11; overflow: hidden; }
      body { font-family: ui-monospace, Menlo, Consolas, monospace; color: #cfd5dc; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; width: 100%; height: 100%; }
      #overlay {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(8, 11, 14, 0.82); backdrop-filter: blur(4px);
        user-select: none; transition: opacity .25s ease;
        padding: 20px;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay .card {
        max-width: 460px; width: 100%; padding: 28px 30px 24px; border-radius: 14px;
        background: rgba(20,26,32,0.95); border: 1px solid rgba(255,255,255,0.08);
        text-align: center; line-height: 1.55;
      }
      h1 { margin: 0 0 4px; font-size: 18px; letter-spacing: 0.04em; }
      .sub { margin: 0 0 22px; color: #6f7a83; font-size: 12px;
             letter-spacing: 0.06em; text-transform: uppercase; }

      .tier-label { color: #6f7a83; font-size: 11px; letter-spacing: 0.08em;
                    text-transform: uppercase; margin-bottom: 8px; }
      .tiers { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
               margin-bottom: 20px; }
      .tier {
        padding: 12px 8px; border-radius: 8px; cursor: pointer;
        background: rgba(35,44,52,0.6); border: 1px solid rgba(255,255,255,0.06);
        transition: background .12s ease, border-color .12s ease;
        font-family: inherit; color: inherit;
      }
      .tier:hover { background: rgba(48,60,70,0.85); }
      .tier.active {
        background: rgba(48,60,70,0.95);
        border-color: rgba(255,212,130,0.55);
        box-shadow: 0 0 0 1px rgba(255,212,130,0.15);
      }
      .tier .name { color: #ffd482; font-size: 13px; letter-spacing: 0.05em;
                    margin-bottom: 2px; }
      .tier .desc { color: #9aa6b0; font-size: 10px; line-height: 1.3; }

      #start {
        display: block; width: 100%; padding: 16px;
        background: rgba(255,212,130,0.92); color: #1a1308; border: none;
        font-family: inherit; font-size: 14px; letter-spacing: 0.18em;
        font-weight: 600; text-transform: uppercase; cursor: pointer;
        border-radius: 10px; transition: background .12s ease, transform .08s ease;
      }
      #start:hover { background: #ffd482; }
      #start:active { transform: scale(0.99); }
      .hint { margin-top: 16px; color: #6f7a83; font-size: 11px;
              letter-spacing: 0.04em; }

      #hud {
        position: fixed; left: 10px; bottom: 10px;
        font-size: 11px; color: rgba(154, 166, 176, 0.6); pointer-events: none;
        background: rgba(8,11,14,0.35); padding: 4px 8px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.04);
        font-variant-numeric: tabular-nums;
      }
      #back-hint {
        position: fixed; left: 50%; bottom: 36px; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.7);
        text-transform: uppercase; pointer-events: none;
        opacity: 0; transition: opacity 1.2s ease;
        text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      }
      #back-hint kbd {
        background: rgba(28,35,42,0.85); border: 1px solid rgba(255,255,255,0.18);
        padding: 1px 6px; border-radius: 4px; font-size: 11px; color: #f0f4f8;
      }
      #back-hint.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"><span id="stats">initializing…</span></div>
    <div id="back-hint">press <kbd>Esc</kbd> to return · or tap once</div>
    <div id="overlay">
      <div class="card">
        <h1>Infinite forest · godrays</h1>
        <p class="sub">volumetric sun · auto explore</p>

        <div class="tier-label">graphics</div>
        <div class="tiers">
          <button class="tier" data-tier="low" type="button">
            <div class="name">Low</div>
            <div class="desc">phones · integrated GPU</div>
          </button>
          <button class="tier" data-tier="medium" type="button">
            <div class="name">Medium</div>
            <div class="desc">most modern devices</div>
          </button>
          <button class="tier" data-tier="high" type="button">
            <div class="name">High</div>
            <div class="desc">desktop · gaming GPU</div>
          </button>
        </div>

        <button id="start" type="button">Start</button>
        <p class="hint">on mobile · tilt your phone to look around</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
