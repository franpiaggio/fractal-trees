<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>02 · FPS infinite forest</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a0d11; overflow: hidden; }
      body { font-family: ui-monospace, Menlo, Consolas, monospace; color: #cfd5dc; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; width: 100%; height: 100%; }
      #crosshair {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        width: 6px; height: 6px; border-radius: 50%;
        background: rgba(255,255,255,0.55); pointer-events: none;
        box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      }
      #overlay {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(8, 11, 14, 0.75); backdrop-filter: blur(4px);
        cursor: pointer; user-select: none; transition: opacity .25s ease;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay .card {
        max-width: 460px; padding: 28px 32px; border-radius: 12px;
        background: rgba(20,26,32,0.92); border: 1px solid rgba(255,255,255,0.08);
        text-align: center; line-height: 1.55;
      }
      #overlay h1 { margin: 0 0 8px; font-size: 18px; letter-spacing: 0.04em; }
      #overlay p  { margin: 6px 0; color: #97a3ad; font-size: 13px; }
      #overlay kbd {
        background: #1c232a; border: 1px solid #2a323a; padding: 1px 6px;
        border-radius: 4px; font-size: 12px; color: #e2e8ee;
      }
      #overlay .go { margin-top: 14px; color: #ffd482; font-size: 12px; letter-spacing: .08em; }
      #hud {
        position: fixed; left: 10px; bottom: 10px;
        font-size: 11px; color: #9aa6b0; pointer-events: none;
        background: rgba(8,11,14,0.45); padding: 6px 10px; border-radius: 6px;
        border: 1px solid rgba(255,255,255,0.05);
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="crosshair"></div>
    <div id="hud"><span id="stats">initializing…</span></div>
    <div id="overlay">
      <div class="card">
        <h1>FPS infinite forest</h1>
        <p>Walk: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> &nbsp;·&nbsp; Run: <kbd>Shift</kbd></p>
        <p>Look: mouse &nbsp;or&nbsp; <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd></p>
        <p>Trees block you · world streams as you walk</p>
        <p class="go">click to enter</p>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
