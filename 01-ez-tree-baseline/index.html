<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractal Trees — Three.js + EZ-Tree</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0a1014; overflow: hidden; font-family: system-ui, sans-serif; }
      #app { position: fixed; inset: 0; }
      #hud {
        position: fixed; top: 12px; left: 12px;
        color: #cfd8dc; font-size: 12px; line-height: 1.4;
        padding: 8px 10px; background: rgba(0,0,0,.4);
        border-radius: 6px; pointer-events: none;
        backdrop-filter: blur(4px);
      }
      #hud b { color: #fff; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <b>Fractal Trees</b><br />
      drag to orbit · scroll to zoom<br />
      <span id="stats"></span>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
